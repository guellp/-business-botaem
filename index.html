</div>
                <!-- 텍스트 검색 -->
                <div class="filter-item">
                    <label class="filter-label" for="search-input">서비스명 또는 지원대상 검색</label>

                        <div class="search-wrapper">
                            <input type="text" id="search-input" class="form-input" placeholder="예: 소상공인, 보증서, 창업, 일자리, 운전자금 등 입력...">

    <!-- 결과 리스트 영역 -->
    <main class="container">

                검색 결과: <strong id="total-count">0</strong>건 (화면 표시: <span id="current-count">0</span>건)

    <!-- 로컬 데이터베이스 및 데이터 바인딩 자바스크립트 -->
    <script>
        // 구글 시트 웹게시 CSV 주소 (데이터 인젝터 작동 시 대체용, 비워두면 MOCK_DATA 사용)
        const CSV_URL = "";

        // 구글 시트 데이터를 정제해 주입하는 금고 영역
        const MOCK_DATA = [];

        // DOM 요소들 바인딩
        const statusBadge = document.getElementById('connection-status');
        const containerSido = document.getElementById('container-sido');
        const containerGugun = document.getElementById('container-gugun');
        const containerAgency = document.getElementById('container-agency');
        const containerType = document.getElementById('container-type');
        const searchInput = document.getElementById('search-input');
        const btnReset = document.getElementById('btn-reset');
        const cardsContainer = document.getElementById('cards-container');
        const totalCountSpan = document.getElementById('total-count');
        const currentCountSpan = document.getElementById('current-count');
        const btnLoadMore = document.getElementById('btn-load-more');
        const loaderArea = document.getElementById('loader-area');

        // 커스텀 드롭다운 열기/닫기 토글
        document.addEventListener('click', function(e) {
            const trigger = e.target.closest('.custom-select-trigger');
            if (trigger) {
                e.stopPropagation();
                const container = trigger.parentElement;
                
                // 구군의 경우 disabled 면 작동 금지
                if (container.id === 'container-gugun' && trigger.hasAttribute('disabled')) {
                    return;
                }

                // 다른 열려있는 드롭다운 모두 닫기
                document.querySelectorAll('.custom-select-container').forEach(c => {
                    if (c !== container) c.classList.remove('open');
                });
                
                container.classList.toggle('open');
            } else {
                // 외부 클릭 시 모든 드롭다운 닫기
                document.querySelectorAll('.custom-select-container').forEach(c => {
                    c.classList.remove('open');
                });
            }
        });

        // 드롭다운 옵션 내부 클릭 시 닫히지 않도록 이벤트 전파 차단
        document.addEventListener('click', function(e) {
            if (e.target.closest('.custom-select-options')) {
                e.stopPropagation();
            }
        });

        // 선택된 값들을 수집하는 헬퍼 함수
        function getSelectedValues(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return [];
            const checkedBoxes = container.querySelectorAll('.custom-select-options input[type="checkbox"]:checked');
            return Array.from(checkedBoxes).map(cb => cb.value);
        }

        // 선택 완료 후 트리거 텍스트를 업데이트하는 함수
        function updateTriggerText(containerId, defaultText) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const trigger = container.querySelector('.custom-select-trigger');
            const selected = getSelectedValues(containerId);
            
            if (selected.length === 0) {
                trigger.textContent = defaultText;
            } else if (selected.length === 1) {
                trigger.textContent = selected[0];
            } else {
                trigger.textContent = `${selected[0]} 외 ${selected.length - 1}건`;
            }
        }

        CHUNK_SIZE = 150;

        // ==========================================
        // 3. 페이지 초기화 및 로딩 함수
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            if (CSV_URL && CSV_URL.trim() !== '') {
                fetchGoogleSheetData(CSV_URL);
            } else {
                console.log("구글 시트 주소가 비어있어 로컬 데이터(Mock Data)를 로드합니다.");
                loadLocalMockData();
            }
            
            // 필터 이벤트 바인딩
            searchInput.addEventListener('input', applyFilters);
            btnReset.addEventListener('click', resetFilters);
            btnLoadMore.addEventListener('click', loadMoreResults);
        });

        // 로컬 데이터 로딩
        function loadLocalMockData() {
            allData = MOCK_DATA;
            statusBadge.textContent = "연동 완료";
            statusBadge.style.backgroundColor = "#e8f5e9";
            statusBadge.style.color = "#2e7d32";
            initFilters();
            applyFilters();
        }

        // 3-A. 구글 시트 CSV Fetch 및 파싱
        function fetchGoogleSheetData(url) {
            statusBadge.textContent = "연동 중..";
            
            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("CSV 파싱 성공: ", results.data.length, "건");
                    
                    allData = results.data.map(item => {
                        return {
                            "지역": (item["지역(도/시)"] || item["지역"] || item["시도"] || "").trim(),
                            "도시": (item["지역(시/군/구)"] || item["도시"] || item["구군"] || "").trim(),
                            "서비스명": (item["서비스명"] || item["상품"] || item["상품명"] || "").trim(),
                            "소관부처": (item["소관부처/지자체"] || item["소관부처"] || item["소관기관명"] || "").trim(),
                            "수행기관": (item["사업수행기관"] || item["수행기관"] || item["소관기관명"] || "").trim(),
                            "신청기한": (item["신청기한"] || item["신청기간"] || item["시행기간"] || "").trim(),
                            "지원내용": (item["지원내용"] || item["사업개요"] || item["상품설명"] || "").trim(),
                            "지원대상": (item["지원대상"] || item["상품특성"] || "").trim(),
                            "신청방법": (item["신청방법"] || item["사업신청방법"] || "").trim(),
                            "정보수정일": (item["정보수정일"] || item["데이터수집일"] || "").trim()
                        };
                    }).filter(item => item["서비스명"]);

                    statusBadge.textContent = "연동 완료";
                    statusBadge.style.backgroundColor = "#e8f5e9";
                    statusBadge.style.color = "#2e7d32";
                    
                    initFilters();
                    applyFilters();
                },
                error: function(err) {
                    console.error("데이터 로드 실패, 로컬 데이터를 로드합니다.", err);
                    loadLocalMockData();
                }
            });
        }

        // ==========================================
        // 4. 필터 드롭다운 동적 생성
        // ==========================================
        function initFilters() {
            // 1. 시도 목록 수집 및 렌더링
            let sidos = [...new Set(allData.map(item => item['시도']))].filter(Boolean).sort();
            const hasNational = sidos.includes('전국');
            if (hasNational) {
                sidos = sidos.filter(s => s !== '전국');
            }
            
            const optionsSido = document.getElementById('options-sido');
            optionsSido.innerHTML = '';
            
            if (hasNational) {
                createCheckboxOption(optionsSido, '전국', '전국 (중앙/전국 단위 지원)', 'container-sido', '전체 (시도)', handleSidoChange);
            }
            sidos.forEach(sido => {
                createCheckboxOption(optionsSido, sido, sido, 'container-sido', '전체 (시도)', handleSidoChange);
            });

            // 2. 소관부처 목록 수집 및 렌더링
            const agencies = [...new Set(allData.map(item => item['소관부처']))].filter(Boolean).sort();
            const optionsAgency = document.getElementById('options-agency');
            optionsAgency.innerHTML = '';
            agencies.forEach(agency => {
                createCheckboxOption(optionsAgency, agency, agency, 'container-agency', '전체 소관부처', applyFilters);
            });

            // 3. 지원구분 목록 수집 및 렌더링
            const types = [...new Set(allData.map(item => item['지원구분']))].filter(Boolean).sort();
            const optionsType = document.getElementById('options-type');
            optionsType.innerHTML = '';
            types.forEach(type => {
                createCheckboxOption(optionsType, type, type, 'container-type', '전체 지원형태', applyFilters);
            });

            // 구군 비활성화 초기화
            const triggerGugun = document.getElementById('trigger-gugun');
            triggerGugun.textContent = '시도를 먼저 선택하세요';
            triggerGugun.disabled = true;
            document.getElementById('options-gugun').innerHTML = '';
        }

        // 체크박스 옵션을 생성하는 도우미 함수
        function createCheckboxOption(parentEl, value, labelText, containerId, defaultText, changeCallback) {
            const label = document.createElement('label');
            label.className = 'custom-select-option';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = value;
            
            checkbox.addEventListener('change', () => {
                updateTriggerText(containerId, defaultText);
                if (changeCallback) changeCallback();
            });
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(labelText));
            parentEl.appendChild(label);
        }

        // 체크박스 옵션을 생성하는 도우미 함수
        function createCheckboxOption(parentEl, value, labelText, containerId, defaultText, changeCallback) {
            const label = document.createElement('label');
            label.className = 'custom-select-option';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = value;
            
            checkbox.addEventListener('change', () => {
                updateTriggerText(containerId, defaultText);
                if (changeCallback) changeCallback();
            });
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(labelText));
            parentEl.appendChild(label);
        }

        // 4-A. 지역 변경시 하위 도시 드롭다운 동적 업데이트
        function handleSidoChange() {
            const selectedSidos = getSelectedValues('container-sido');
            const triggerGugun = document.getElementById('trigger-gugun');
            const optionsGugun = document.getElementById('options-gugun');
            
            if (selectedSidos.length === 0) {
                triggerGugun.textContent = '시도를 먼저 선택하세요';
                triggerGugun.disabled = true;
                optionsGugun.innerHTML = '';
                applyFilters();
                return;
            }

            // 선택된 모든 시도에 소속된 구군 목록 추출
            const filteredGuguns = allData
                .filter(item => selectedSidos.includes(item['시도']))
                .map(item => item['구군'])
                .filter(Boolean);
                
            const uniqueGuguns = [...new Set(filteredGuguns)].sort();
            const gugunList = uniqueGuguns.filter(g => g !== '전지역');
            const hasAllRegion = uniqueGuguns.includes('전지역');

            optionsGugun.innerHTML = '';
            
            if (hasAllRegion) {
                createCheckboxOption(optionsGugun, '전지역', '전지역 (전 지역 해당 혜택)', 'container-gugun', '전체 구/군', applyFilters);
            }
            gugunList.forEach(gugun => {
                createCheckboxOption(optionsGugun, gugun, gugun, 'container-gugun', '전체 구/군', applyFilters);
            });
            
            triggerGugun.disabled = false;
            updateTriggerText('container-gugun', '전체 구/군');
            
            applyFilters();
        }

        // ==========================================
        // 5. 핵심 필터 및 검색 처리 엔진
        // ==========================================
        function applyFilters() {
            const selectedSidos = getSelectedValues('container-sido');
            const selectedGuguns = getSelectedValues('container-gugun');
            const selectedAgencies = getSelectedValues('container-agency');
            const selectedTypes = getSelectedValues('container-type');
            const searchQuery = searchInput.value.trim().toLowerCase();

            filteredData = allData.filter(item => {
                if (selectedSidos.length > 0 && !selectedSidos.includes(item['시도']) && item['시도'] !== '전국') return false;
                if (selectedGuguns.length > 0 && !selectedGuguns.includes(item['구군'])) return false;
                if (selectedAgencies.length > 0 && !selectedAgencies.includes(item['소관부처'])) return false;
                if (selectedTypes.length > 0 && !selectedTypes.includes(item['지원구분'])) return false;
                
                if (searchQuery) {
                    const sName = (item['서비스명'] || '').toLowerCase();
                    const sAgency = (item['소관기관명'] || '').toLowerCase();
                    const sContent = (item['지원내용'] || '').toLowerCase();
                    const sTarget = (item['지원대상'] || '').toLowerCase();
                    if (!sName.includes(searchQuery) && 
                        !sAgency.includes(searchQuery) && 
                        !sContent.includes(searchQuery) && 
                        !sTarget.includes(searchQuery)) {
                        return false;
                    }
                }
                return true;
            });

            currentLimit = CHUNK_SIZE;
            renderCards();
        }

        // 5-A. 필터 완전 초기화
        function resetFilters() {
            // 모든 체크박스 해제
            document.querySelectorAll('.custom-select-options input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            
            // 모든 트리거 텍스트 초기화
            updateTriggerText('container-sido', '전체 (시도)');
            updateTriggerText('container-agency', '전체 소관부처');
            updateTriggerText('container-type', '전체 지원형태');
            
            // 구군 초기화
            const triggerGugun = document.getElementById('trigger-gugun');
            triggerGugun.textContent = '시도를 먼저 선택하세요';
            triggerGugun.disabled = true;
            document.getElementById('options-gugun').innerHTML = '';
            
            searchInput.value = "";
            applyFilters();
        }

        // ==========================================
        // 6. 최적화 카드 렌더링 기능 (성능 보호)
        // ==========================================
        
        // 카드 상세 접기/펼치기 제어 함수
        function toggleCardDetail(btn) {
            const cardMain = btn.closest('.card-item');
            const bodyInfo = cardMain.querySelector('.card-body-info');
            const btnSpan = btn.querySelector('span');
            const btnIcon = btn.querySelector('.toggle-icon');
            
            if (bodyInfo.classList.contains('collapsed')) {
                bodyInfo.classList.remove('collapsed');
                btnSpan.textContent = "상세 내용 접기";
                btnIcon.textContent = "∧";
                btn.classList.add('active');
            } else {
                bodyInfo.classList.add('collapsed');
                btnSpan.textContent = "상세 내용 보기";
                btnIcon.textContent = "∨";
                btn.classList.remove('active');
            }
        }

        // 텍스트 내 웹주소 URL 링크 자동 전환 헬퍼
        function formatText(text) {
            if (!text) return '';
            // HTML Escape
            let escaped = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
            
            // URL 감지 후 <a> 링크로 변경
            const urlPattern = /(https?:\/\/[^\s()<>]+)/gi;
            escaped = escaped.replace(urlPattern, '<a href="$1" target="_blank" class="text-link">$1</a>');
            
            // 개행문자를 <br>로 치환
            return escaped.replace(/\n/g, '<br>');
        }

        function renderCards() {
            cardsContainer.innerHTML = "";

            const totalResults = filteredData.length;
            totalCountSpan.textContent = totalResults.toLocaleString();

            if (totalResults === 0) {
                cardsContainer.innerHTML = '<div class="status-message">조건에 부합하는 정책자금 및 지원사업 정보가 없습니다. 다른 조건으로 검색해 보세요.</div>';
                currentCountSpan.textContent = "0";
                loaderArea.style.display = "none";
                return;
            }

            const displayChunk = filteredData.slice(0, currentLimit);
            currentCountSpan.textContent = displayChunk.length.toLocaleString();

            displayChunk.forEach(item => {
                const card = document.createElement('div');
                card.className = "card-item";

                // 기한 텍스트 가공
                const deadline = item['신청기한'] || '상시수집';
                const isUrgent = deadline.includes('마감') || deadline.includes('~') || deadline.includes('지정');
                const deadlineClass = isUrgent ? 'class="deadline-value"' : '';

                // 도시/지역 텍스트 가공
                const region = item['지역'] || '';
                const city = (item['도시'] && item['도시'].trim() !== '-') ? item['도시'].trim() : '';
                const regionText = city ? `지역: ${region} ${city}` : `지역: ${region}`;

                card.innerHTML = `
                    <div class="card-item-header">
                        <div class="card-badge-group">
                            <span class="badge-sector">${item['소관부처'] || '기타부처'}</span>
                            <span class="badge-type">${item['수행기관'] || '기타기관'}</span>
                        </div>
                        <span class="card-authority">${item['수행기관'] || '기타기관'} | ${regionText}</span>
                    </div>
                    <h3 class="card-title-text">${item['서비스명']}</h3>
                    
                    <div class="card-body-info collapsed">
                        <div class="info-row">
                            <span class="info-label">지원 대상</span>
                            <span class="info-value">${formatText(item['지원대상'] || '공고 본문을 확인해 주세요.')}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">지원 혜택 내용</span>
                            <span class="info-value">${formatText(item['지원내용'] || '상세 공고 내용을 확인해 주세요.')}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">신청 방법 및 경로</span>
                            <span class="info-value">${formatText(item['신청방법'] || '해당 소관기관 문의')}</span>
                        </div>
                    </div>
                    
                    <div class="card-toggle-area">
                        <button class="btn-toggle-detail" onclick="toggleCardDetail(this)">
                            <span>상세 내용 보기</span> <strong class="toggle-icon">∨</strong>
                        </button>
                    </div>

                    <div class="card-item-footer">
                        <span class="deadline">신청 기한: <strong ${deadlineClass}>${deadline}</strong></span>
                        <span class="update-date">수정일: ${item['정보수정일'] || '상시'}</span>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });

            if (currentLimit < totalResults) {
                loaderArea.style.display = "block";
            } else {
                loaderArea.style.display = "none";
            }
        }

        // 6-A. 더보기 렌더링 한계 늘리기
        function loadMoreResults() {
            currentLimit += CHUNK_SIZE;
            renderCards();
        }

        // MOCK_DATA 자동 바인딩 로드
        allData = MOCK_DATA;
        statusBadge.textContent = "연동 완료";
        statusBadge.style.backgroundColor = "#e8f5e9";
        statusBadge.style.color = "#2e7d32";
        initFilters();
        applyFilters();

        
        
    </script>
</body>
</html>
